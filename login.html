<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ShopEase</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <h1>Welcome Back</h1>
      <p>Login to continue shopping and discover amazing deals!</p>
    </div>
    <div class="auth-right">
      <div class="auth-form-container">
        <h2>Login</h2>
        <p>Enter your credentials to access your account</p>
        
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            <span class="error-message">Please enter a valid email</span>
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <span class="error-message">Please enter your password</span>
          </div>
          
          <div class="form-row" style="justify-content: space-between; margin-bottom: 20px;">
            <div class="checkbox-group">
              <input type="checkbox" id="remember" name="remember">
              <label for="remember">Remember Me</label>
            </div>
            <a href="#" class="form-link">Forgot Password?</a>
          </div>
          
          <button type="submit" class="btn btn-primary auth-btn">Login</button>
        </form>
        
        <div class="divider">Or login with</div>
        
        <div class="social-login">
          <button type="button" class="social-btn">
            <i class="fab fa-google" style="color: #DB4437;"></i>
            Google
          </button>
          <button type="button" class="social-btn">
            <i class="fab fa-facebook-f" style="color: #4267B2;"></i>
            Facebook
          </button>
        </div>
        
        <p style="text-align: center; margin-top: 24px; color: var(--text-secondary);">
          Don't have an account? <a href="register.html" class="form-link">Register</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
